<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1" />
        <meta
            name="color-scheme"
            content="dark" />
        <meta
            name="theme-color"
            content="#020618" />
        <link
            rel="icon"
            href="%sveltekit.assets%/favicon.ico" />
        <link
            rel="manifest"
            href="%sveltekit.assets%/manifest.webmanifest" />
        <link
            rel="apple-touch-icon"
            href="%sveltekit.assets%/apple-touch-icon.png" />
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
